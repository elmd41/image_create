# ========================================
# Nginx 配置 - pic.deluagent.com
# ========================================
# 将此配置添加到 Nginx 容器的配置文件中
# 位置: /etc/nginx/conf.d/pic.deluagent.com.conf

server {
    listen 80;
    server_name pic.deluagent.com;

    # 日志
    access_log /var/log/nginx/pic.deluagent.com.access.log;
    error_log /var/log/nginx/pic.deluagent.com.error.log;

    # 前端静态文件
    location / {
        root /var/www/picture-ai/web/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置（图像生成可能需要较长时间）
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        
        # 文件上传大小限制
        client_max_body_size 50M;
    }

    # 生成的图片静态服务
    location /generated/ {
        alias /var/www/picture-ai/data/generated/;
        expires 30d;
        add_header Cache-Control "public";
    }
}
