# Nginx 配置文件
# 域名: pic.deluagent.com
# 端口: 80

upstream backend_server {
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name pic.deluagent.com 115.120.248.123;

    # 客户端请求大小限制
    client_max_body_size 100M;

    # 日志配置
    access_log /var/log/nginx/picture-ai.access.log;
    error_log /var/log/nginx/picture-ai.error.log;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # 生成的图片文件
    location /generated/ {
        alias /usr/share/nginx/html/generated/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # API 代理
    location /api/ {
        proxy_pass http://backend_server/api/;
        proxy_http_version 1.1;

        # 请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时设置（图像生成可能需要较长时间）
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 健康检查端点
    location /health {
        proxy_pass http://backend_server/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # API 文档（可选，生产环境可注释掉）
    location /docs {
        proxy_pass http://backend_server/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend_server/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
    gzip_comp_level 6;
}
